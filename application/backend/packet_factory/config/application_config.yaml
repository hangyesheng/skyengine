config:
  env_type: simulation

  simulation:
    env_name: packet_factory
    # 环境运行模式配置
    mode: drl  # drl | optimization
               # drl: 事件驱动强化学习模式
               # optimization: 传统优化调度模式

    # map_config:
    #   由配置文件生成

    # job_config:
    #   由配置文件生成

    # event_config:
    #   由配置文件生成

    agent:
      agent_name: packet_factory.ORToolsAgent
      name: ORToolsAgent
      id: 1
      # agent 模式配置
      ui_mode: frontend      # frontend | backend（是否有可视化界面）
      task_mode: inference  # training | inference（训练还是推理，优化模式只支持inference）
      model_path: null  # 模型文件路径，inference 模式必须提供
      time_limit_seconds: 30  # OR-Tools求解时间限制（秒）
      fallback_enabled: true  # 求解失败时是否回退到贪心算法
      
      # 模式组合说明：
      # 1. ui_mode=frontend + task_mode=training: 前台训练模式（有界面，进行训练）
      # 2. ui_mode=frontend + task_mode=inference: 前台推理模式（有界面，使用模型）- 原 inference
      # 3. ui_mode=backend + task_mode=training: 后台训练模式（无界面，进行训练）- 原 training
      # 4. ui_mode=backend + task_mode=inference: 后台推理模式（无界面，使用模型）- 原 evaluation

    callback:
      map_callback:
        graph_loader:
          name: backend_callback.MapLoader
          args: [ ]
        visualizer:
          name: backend_callback.Visualizer
          args: [ 3 ]    #  fps
        event_queue:
          name: base_callback.EventQueue
          args: [ ]
      agent_callback:
        before_decision:
          name: base_callback.BeforeDecision
          args: [ ]
        after_decision:
          name: base_callback.AfterDecision
          args: [ ]
