config:
  env_type: simulation

  simulation:
    env_name: packet_factory
    # 环境运行模式配置
    mode: drl  # drl | optimization
               # drl: 事件驱动强化学习模式
               # optimization: 传统优化调度模式

    # map_config:
    #   由配置文件生成

    # job_config:
    #   由配置文件生成

    # event_config:
    #   由配置文件生成

    agent:
      agent_name: packet_factory.SimpleRLAgent
      name: 1
      id: 1
      # 强化学习模式配置
      mode: training  # training | evaluation | inference
      model_path: null  # 模型文件路径，evaluation 和 inference 模式必须提供

    callback:
      map_callback:
        graph_loader:
          name: backend_callback.MapLoader
          args: [ ]
        visualizer:
          name: backend_callback.Visualizer
          args: [ 3 ]    #  fps
        event_queue:
          name: base_callback.EventQueue
          args: [ ]
      agent_callback:
        before_decision:
          name: base_callback.BeforeDecision
          args: [ ]
        after_decision:
          name: base_callback.AfterDecision
          args: [ ]
