# 这个文件将不会被使用
# EventGenerator 配置文件示例
# 用于配置事件生成器的各种参数和策略

event_generation:
  # 时间步长
  time_step: 0.1
  
  # 事件配置
  events:
    # AGV故障事件
    packet_factory.AGV_FAIL:
      probability: 0.05          # 生成概率 5%
      strategy: "uniform"        # 均匀分布
      min_interval: 2.0          # 最小间隔 2秒
      max_interval: 10.0         # 最大间隔 10秒
      burst_probability: 0.02    # 突发事件概率 2%
      burst_multiplier: 3        # 突发事件倍数
    
    # 机器故障事件
    packet_factory.MACHINE_FAIL:
      probability: 0.03          # 生成概率 3%
      strategy: "poisson"        # 泊松分布
      min_interval: 5.0          # 最小间隔 5秒
      max_interval: 20.0         # 最大间隔 20秒
      burst_probability: 0.01    # 突发事件概率 1%
      burst_multiplier: 2        # 突发事件倍数
    
    # 作业添加事件
    packet_factory.JOB_ADD:
      probability: 0.1            # 生成概率 10%
      strategy: "exponential"     # 指数分布
      min_interval: 1.0           # 最小间隔 1秒
      max_interval: 5.0          # 最大间隔 5秒
      burst_probability: 0.05    # 突发事件概率 5%
      burst_multiplier: 5        # 突发事件倍数
    
    # 环境暂停事件
    packet_factory.ENV_PAUSED:
      probability: 0.01          # 生成概率 1%
      strategy: "uniform"        # 均匀分布
      min_interval: 30.0         # 最小间隔 30秒
      max_interval: 120.0        # 最大间隔 120秒
      burst_probability: 0.0     # 无突发事件
      burst_multiplier: 1        # 突发事件倍数
    
    # 环境恢复事件
    packet_factory.ENV_RECOVER:
      probability: 0.8           # 生成概率 80%（通常紧跟在暂停后）
      strategy: "custom"         # 自定义分布
      min_interval: 0.1          # 最小间隔 0.1秒
      max_interval: 2.0          # 最大间隔 2秒
      burst_probability: 0.0     # 无突发事件
      burst_multiplier: 1        # 突发事件倍数

# 高级配置选项
advanced:
  # 是否启用事件生成统计
  enable_stats: true
  
  # 统计报告间隔（秒）
  stats_report_interval: 60.0
  
  # 最大队列大小
  max_queue_size: 1000
  
  # 是否启用事件优先级
  enable_priority: false
  
  # 事件过滤规则
  filters:
    - type: "time_based"
      condition: "hour >= 9 and hour <= 17"  # 工作时间
    - type: "frequency_based"
      condition: "events_per_minute < 10"     # 频率限制
